<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<!-- I suck at css stfu -->
	<title>WiFi Login</title>
	<link rel="stylesheet" href="style.css">
	<!-- import script -->
	<!-- <script src="script.js"></script> -->
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			animation: ease-in-out 5s infinite;
		}

		body {
			font-family: "Open Sans", sans-serif;
			font-size: 14px;
			line-height: 1.6;
			color: #777;
			background: #eee;
		}

		.container {
			/* Smack-center of the page */
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.login-form {
			width: 25%;

			/* 	margin: 0 auto;
	padding: 80px 0 40px;
	box-sizing: border-box;
	border: 1px solid #ccc;
	border-radius: 10%;
	background: #777;
	color: #fff;
	 */
		}

		.login-form .logo {
			margin-bottom: 40px;
			text-align: center;
		}

		.login-form .login-txt,
		.login-passwd {
			/* Add spacing between and align to center of div */
			display: flex;
			width: 100%;
			height: 50px;
			margin-bottom: 5%;
			border-radius: 5%;
			border-color: transparent;
		}

		.login-form .login-txt:focus,
		.login-passwd:focus {
			border-color: #777;
			box-shadow: 0 0 5px #777;
		}


		.login-form .submit-button {
			width: 100%;
			height: 40px;
			border: none;
			background: #777;
			color: #fff;
			border-radius: 4px;
			cursor: pointer;
			/* animation: ease-in-out 5s infinite; */
		}

		.login-form .submit-button:hover {
			/* Animation */
			background-color: black;
			animation: ease-in-out 5s infinite;
		}

		.login-form .login-footer {
			margin-top: 24px;
			text-align: center;
		}

		.login-form .register {
			margin-top: 24px;
			text-align: center;
		}


		.login-form .login-footer a {
			color: #777;
			text-decoration: none;
		}

		.login-form .login-footer a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="login-form">
			<div class="logo">
				<h1>Login-in to Wi-Fi</h1>
			</div>
			<form action="/api/auth" method="post">
				<input type="email" name="email" placeholder="Email" class="login-txt" required>
				<input type="password" name="password" placeholder="Password" class="login-passwd" required>
				<input type="submit" value="Login" class="submit-button">
			</form>
			<div class="login-footer">
				<a href="/forgot">Forgot Password/Username?</a>
			</div>
		</div>
	</div>
</body>

</html>
